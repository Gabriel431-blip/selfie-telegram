<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📸 Photo → Telegram</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #ff3cac;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,229,255,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,60,172,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      box-shadow: 0 0 60px rgba(0,229,255,0.04), 0 20px 60px rgba(0,0,0,0.4);
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }

    .cam-wrap {
      position: relative;
      border-radius: 1rem;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      aspect-ratio: 4/3;
    }

    video, canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas { display: none; }

    .cam-label {
      position: absolute;
      top: 0.6rem; left: 0.8rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,0,0,0.6);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .btn {
      border: none;
      border-radius: 0.75rem;
      padding: 0.9rem 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.04em;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-snap {
      background: linear-gradient(135deg, var(--accent), #0080ff);
      color: #000;
    }

    .btn-snap:not(:disabled):hover {
      box-shadow: 0 0 25px rgba(0,229,255,0.35);
    }

    .btn-send {
      background: linear-gradient(135deg, var(--accent2), #ff7f50);
      color: #fff;
    }

    .btn-send:not(:disabled):hover {
      box-shadow: 0 0 25px rgba(255,60,172,0.35);
    }

    .preview-wrap {
      display: none;
      flex-direction: column;
      gap: 0.8rem;
    }

    .preview-wrap.visible { display: flex; }

    .preview-wrap img {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
    }

    .status {
      font-size: 0.75rem;
      text-align: center;
      padding: 0.6rem;
      border-radius: 0.5rem;
      display: none;
      letter-spacing: 0.05em;
    }

    .status.ok  { background: rgba(0,255,150,0.1); color: #00ff96; display: block; }
    .status.err { background: rgba(255,60,60,0.1);  color: #ff5555;  display: block; }
    .status.loading { background: rgba(0,229,255,0.08); color: var(--accent); display: block; }

    .retake {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.72rem;
    }

    .retake:hover { border-color: var(--text); color: var(--text); }
  </style>
</head>
<body>

<h1>📸 Selfie → Telegram</h1>
<p class="subtitle">capture &amp; envoie instantanément</p>

<div class="card">
  <div class="field">
    <label>🤖 Bot Token</label>
    <input type="text" id="token" placeholder="123456:ABCdef..." />
  </div>
  <div class="field">
    <label>💬 Chat ID</label>
    <input type="text" id="chatid" placeholder="ton_chat_id" />
  </div>

  <div class="cam-wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <span class="cam-label">⬤ LIVE</span>
  </div>

  <button class="btn btn-snap" id="snapBtn">📸 Prendre la photo</button>

  <div class="preview-wrap" id="previewWrap">
    <img id="preview" src="" alt="preview" />
    <button class="btn btn-send" id="sendBtn">🚀 Envoyer sur Telegram</button>
    <button class="btn retake" id="retakeBtn">↩ Reprendre</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const snapBtn  = document.getElementById('snapBtn');
  const sendBtn  = document.getElementById('sendBtn');
  const retakeBtn= document.getElementById('retakeBtn');
  const preview  = document.getElementById('preview');
  const previewWrap = document.getElementById('previewWrap');
  const status   = document.getElementById('status');
  const tokenIn  = document.getElementById('token');
  const chatIn   = document.getElementById('chatid');

  let photoBlob = null;

  // Démarrer la caméra
  async function startCam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      video.srcObject = stream;
    } catch(e) {
      setStatus('err', '❌ Impossible d\'accéder à la caméra : ' + e.message);
    }
  }

  startCam();

  // Prendre la photo
  snapBtn.addEventListener('click', () => {
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);

    canvas.toBlob(blob => {
      photoBlob = blob;
      preview.src = URL.createObjectURL(blob);
      previewWrap.classList.add('visible');
      snapBtn.style.display = 'none';
      video.style.display = 'none';
      document.querySelector('.cam-label').style.display = 'none';
      clearStatus();
    }, 'image/jpeg', 0.92);
  });

  // Reprendre
  retakeBtn.addEventListener('click', () => {
    photoBlob = null;
    previewWrap.classList.remove('visible');
    snapBtn.style.display = '';
    video.style.display = '';
    document.querySelector('.cam-label').style.display = '';
    clearStatus();
  });

  // Envoyer sur Telegram
  sendBtn.addEventListener('click', async () => {
    const token  = tokenIn.value.trim();
    const chatId = chatIn.value.trim();

    if (!token || !chatId) { setStatus('err', '⚠️ Remplis le token et le chat ID !'); return; }
    if (!photoBlob)        { setStatus('err', '⚠️ Prends d\'abord une photo !');      return; }

    sendBtn.disabled = true;
    setStatus('loading', '⏳ Envoi en cours…');

    const form = new FormData();
    form.append('chat_id', chatId);
    form.append('photo',   photoBlob, 'selfie.jpg');

    try {
      const res  = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: form });
      const data = await res.json();

      if (data.ok) {
        setStatus('ok', '✅ Photo envoyée sur Telegram !');
      } else {
        setStatus('err', '❌ Erreur Telegram : ' + (data.description || 'inconnue'));
      }
    } catch(e) {
      setStatus('err', '❌ Erreur réseau : ' + e.message);
    } finally {
      sendBtn.disabled = false;
    }
  });

  function setStatus(type, msg) {
    status.className = 'status ' + type;
    status.textContent = msg;
  }

  function clearStatus() {
    status.className = 'status';
    status.textContent = '';
  }
</script>
</body>
</html>
